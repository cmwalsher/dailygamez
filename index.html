<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>dailygamez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0f14;
      color: #e8eaf0;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: #fff; }
    .header h1 span { color: #39ff85; }
    .header .date {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: #5a5f70;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .tabs {
      display: flex; gap: 4px;
      background: #161820; border-radius: 12px;
      padding: 4px; margin-bottom: 24px;
    }
    .tab {
      flex: 1; padding: 10px 0; border: none;
      background: transparent; color: #5a5f70;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.85rem; border-radius: 8px; cursor: pointer;
    }
    .tab.active { background: #1e2130; color: #fff; }
    .section { display: none; }
    .section.active { display: block; }
    .player-select { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
    .player-select label {
      font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 2px; color: #5a5f70;
      font-family: 'Space Mono', monospace;
    }
    .player-buttons { display: flex; gap: 10px; }
    .player-btn {
      flex: 1; padding: 14px 0;
      border: 2px solid #1e2130; border-radius: 12px;
      background: #161820; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
    }
    .player-btn .p-emoji { font-size: 1.8rem; }
    .player-btn .p-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem; color: #5a5f70; font-weight: 700;
    }
    .player-btn.selected { border-color: #39ff85; background: #0d1f16; }
    .player-btn.selected .p-label { color: #39ff85; }
    .game-cards { display: flex; flex-direction: column; gap: 14px; }
    .game-card {
      background: #161820; border-radius: 14px;
      border: 1px solid #1e2130; overflow: hidden;
    }
    .game-card.done { border-color: #1e3a28; }
    .game-card-header {
      display: flex; align-items: center;
      justify-content: space-between; padding: 14px 16px;
    }
    .game-title { display: flex; align-items: center; gap: 10px; }
    .game-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .game-name { font-weight: 700; font-size: 0.95rem; }
    .game-score-badge {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem; font-weight: 700;
      min-width: 32px; text-align: right;
    }
    .game-card-body { padding: 0 16px 14px; display: flex; flex-direction: column; gap: 10px; }
    .btn-row { display: flex; gap: 8px; }
    .btn-play {
      flex: 1; padding: 10px; border-radius: 8px; border: none;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.85rem; cursor: pointer; color: #0d0f14;
    }
    .btn-paste {
      padding: 10px 14px; border-radius: 8px;
      border: 1px solid #2a2f40; background: #1e2130;
      color: #e8eaf0; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 0.85rem; cursor: pointer;
      white-space: nowrap;
    }
    .manual-row { display: flex; align-items: center; gap: 8px; }
    .manual-row label {
      font-size: 0.7rem; color: #5a5f70;
      font-family: 'Space Mono', monospace; white-space: nowrap;
    }
    .score-select {
      flex: 1; background: #1e2130; border: 1px solid #2a2f40;
      border-radius: 8px; color: #e8eaf0;
      font-family: 'Space Mono', monospace; font-size: 0.9rem;
      padding: 8px 10px; cursor: pointer; outline: none;
    }
    .parse-hint { font-size: 0.72rem; color: #39ff85; font-family: 'Space Mono', monospace; }
    .parse-error { font-size: 0.72rem; color: #ff6b6b; font-family: 'Space Mono', monospace; }
    .submit-section { margin-top: 24px; display: flex; flex-direction: column; gap: 12px; }
    .score-preview {
      background: #161820; border: 1px solid #1e2130;
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .score-preview .preview-label {
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 2px; color: #5a5f70;
      font-family: 'Space Mono', monospace; margin-bottom: 8px;
    }
    .score-preview .preview-string {
      font-family: 'Space Mono', monospace;
      font-size: 1.3rem; font-weight: 700;
      color: #39ff85; letter-spacing: 2px;
    }
    .btn-submit {
      width: 100%; padding: 16px; border-radius: 12px; border: none;
      background: #39ff85; color: #0d0f14;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1rem; cursor: pointer;
    }
    .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-copy {
      width: 100%; padding: 14px; border-radius: 12px;
      border: 1px solid #2a2f40; background: #1e2130;
      color: #e8eaf0; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 0.9rem; cursor: pointer;
    }
    .status-msg {
      text-align: center; font-size: 0.8rem;
      font-family: 'Space Mono', monospace;
      padding: 8px; border-radius: 8px;
    }
    .status-msg.success { color: #39ff85; background: #0d1f16; }
    .status-msg.error { color: #ff6b6b; background: #1f0d0d; }
    .hidden { display: none; }
    .leaderboard { display: flex; flex-direction: column; gap: 20px; }
    .lb-section-title {
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 2px; color: #5a5f70;
      font-family: 'Space Mono', monospace; margin-bottom: 10px;
    }
    .lb-day-card {
      background: #161820; border: 1px solid #1e2130;
      border-radius: 14px; padding: 16px;
    }
    .lb-day-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 14px;
    }
    .lb-day-date {
      font-family: 'Space Mono', monospace; font-size: 0.75rem;
      color: #5a5f70; text-transform: uppercase; letter-spacing: 1px;
    }
    .lb-winner-badge {
      font-size: 0.75rem; font-weight: 700;
      font-family: 'Space Mono', monospace;
      padding: 3px 10px; border-radius: 20px;
      background: #0d1f16; color: #39ff85;
    }
    .lb-player-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #1e2130;
    }
    .lb-player-row:last-child { border-bottom: none; }
    .lb-player-emoji { font-size: 1.3rem; width: 32px; text-align: center; }
    .lb-scores { flex: 1; display: flex; gap: 6px; flex-wrap: wrap; }
    .lb-score-chip {
      font-family: 'Space Mono', monospace; font-size: 0.75rem;
      font-weight: 700; padding: 3px 7px; border-radius: 6px;
      background: #1e2130;
    }
    .lb-total {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem; font-weight: 700;
      min-width: 28px; text-align: right;
    }
    .standings-card {
      background: #161820; border: 1px solid #1e2130;
      border-radius: 14px; padding: 16px;
    }
    .standings-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid #1e2130;
    }
    .standings-row:last-child { border-bottom: none; }
    .standings-rank { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: #5a5f70; width: 20px; }
    .standings-emoji { font-size: 1.4rem; }
    .standings-stats { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .standings-name { font-weight: 700; font-size: 0.9rem; }
    .standings-sub { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: #5a5f70; }
    .standings-wins { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; color: #39ff85; }
    .no-data { text-align: center; padding: 40px 0; color: #5a5f70; font-family: 'Space Mono', monospace; font-size: 0.8rem; }
    .game-breakdown-row { padding: "4px 0"; display: flex; align-items: center; gap: 8px; }


    /* CONFETTI */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 8000;
      width: 100%; height: 100%;
    }
    .cycle-badge {
      display: inline-block;
      background: linear-gradient(135deg, #f7d84b, #f4a200);
      color: #0d0f14;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      margin-left: 6px; letter-spacing: 1px;
    }

    /* PASSWORD GATE */
    #auth-gate {
      position: fixed; inset: 0;
      background: #0d0f14;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; padding: 32px;
    }
    #auth-gate h2 {
      font-size: 2rem; font-weight: 800;
      color: #fff; margin-bottom: 6px;
    }
    #auth-gate h2 span { color: #39ff85; }
    #auth-gate p {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem; color: #5a5f70;
      margin-bottom: 32px; text-align: center;
      letter-spacing: 1px;
    }
    #auth-input {
      width: 100%; max-width: 320px;
      padding: 14px 16px; border-radius: 12px;
      border: 2px solid #1e2130; background: #161820;
      color: #e8eaf0; font-family: 'Space Mono', monospace;
      font-size: 1rem; outline: none; text-align: center;
      letter-spacing: 3px; margin-bottom: 12px;
    }
    #auth-input:focus { border-color: #39ff85; }
    #auth-btn {
      width: 100%; max-width: 320px;
      padding: 14px; border-radius: 12px; border: none;
      background: #39ff85; color: #0d0f14;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1rem; cursor: pointer;
    }
    #auth-error {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem; color: #ff6b6b;
      margin-top: 10px; text-align: center;
      min-height: 20px;
    }
  
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>daily<span>gamez</span></h1>
    <div class="date" id="today-date"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('enter')">Enter Scores</button>
    <button class="tab" onclick="showTab('today')">Today</button>
    <button class="tab" onclick="showTab('standings')">Standings</button>
  </div>

  <!-- ENTER SCORES -->
  <div class="section active" id="section-enter">
    <div class="player-select">
      <label>Who are you?</label>
      <div class="player-buttons">
        <button class="player-btn" onclick="selectPlayer('C','🤖')">
          <span class="p-emoji">🤖</span><span class="p-label">C</span>

        <button class="player-btn" onclick="selectPlayer('E','🫅🏽')">
          <span class="p-emoji">🫅🏽</span><span class="p-label">E</span>
        </button>
        <button class="player-btn" onclick="selectPlayer('M','🤴🏼')">
          <span class="p-emoji">🤴🏼</span><span class="p-label">M</span>
        </button>
      </div>
    </div>

    <div class="game-cards">
      <!-- Wordle -->
      <div class="game-card" id="card-wordle">
        <div class="game-card-header">
          <div class="game-title">
            <div class="game-dot" style="background:#6aaa64"></div>
            <span class="game-name">Wordle</span>
          </div>
          <span class="game-score-badge" id="badge-wordle" style="color:#2a2f40">W</span>
        </div>
        <div class="game-card-body">
          <div class="btn-row">
            <button class="btn-play" style="background:#6aaa64" onclick="window.open('https://www.nytimes.com/games/wordle/index.html','_blank')">▶ Play Wordle</button>
            <button class="btn-paste" onclick="pasteScore('wordle','wordle')">📋 Paste</button>
          </div>
          <div id="hint-wordle" class="parse-hint hidden"></div>
          <div class="manual-row">

            <select class="score-select" id="sel-wordle" onchange="manualScore('wordle',this.value)">

              <option value="1">1</option><option value="2">2</option>
              <option value="3">3</option><option value="4">4</option>

              <option value="0">X (unavailable)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Framed -->
      <div class="game-card" id="card-framed">
        <div class="game-card-header">
          <div class="game-title">
            <div class="game-dot" style="background:#e9a84c"></div>
            <span class="game-name">Framed</span>
          </div>
          <span class="game-score-badge" id="badge-framed" style="color:#2a2f40">F</span>
        </div>
        <div class="game-card-body">
          <div class="btn-row">
            <button class="btn-play" style="background:#e9a84c" onclick="window.open('https://framed.wtf','_blank')">▶ Play Framed</button>
            <button class="btn-paste" onclick="pasteScore('framed','framed')">📋 Paste</button>
          </div>
          <div id="hint-framed" class="parse-hint hidden"></div>
          <div class="manual-row">
            <label>Manual:</label>
            <select class="score-select" id="sel-framed" onchange="manualScore('framed',this.value)">
              <option value="">—</option>
              <option value="1">1</option><option value="2">2</option>
              <option value="3">3</option><option value="4">4</option>
              <option value="5">5</option><option value="6">6</option>
              <option value="10">10 (missed all)</option>
              <option value="0">X (unavailable)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 90s Heardle -->
      <div class="game-card" id="card-heardle_90s">
        <div class="game-card-header">
          <div class="game-title">
            <div class="game-dot" style="background:#e96c9a"></div>
            <span class="game-name">90s Heardle</span>
          </div>
          <span class="game-score-badge" id="badge-heardle_90s" style="color:#2a2f40">9H</span>
        </div>
        <div class="game-card-body">
          <div class="btn-row">
            <button class="btn-play" style="background:#e96c9a" onclick="window.open('https://www.90s.heardledecades.com/','_blank')">▶ Play 90s Heardle</button>
            <button class="btn-paste" onclick="pasteScore('heardle_90s','heardle')">📋 Paste</button>
          </div>
          <div id="hint-heardle_90s" class="parse-hint hidden"></div>
          <div class="manual-row">
            <label>Manual:</label>
            <select class="score-select" id="sel-heardle_90s" onchange="manualScore('heardle_90s',this.value)">
              <option value="">—</option>
              <option value="1">1</option><option value="2">2</option>
              <option value="3">3</option><option value="4">4</option>
              <option value="5">5</option><option value="6">6</option>
              <option value="10">10 (missed all)</option>
              <option value="0">X (unavailable)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 00s Heardle -->
      <div class="game-card" id="card-heardle_00s">
        <div class="game-card-header">
          <div class="game-title">
            <div class="game-dot" style="background:#7b9cff"></div>
            <span class="game-name">00s Heardle</span>
          </div>
          <span class="game-score-badge" id="badge-heardle_00s" style="color:#2a2f40">0H</span>
        </div>
        <div class="game-card-body">
          <div class="btn-row">
            <button class="btn-play" style="background:#7b9cff" onclick="window.open('https://00s.heardledecades.com/','_blank')">▶ Play 00s Heardle</button>
            <button class="btn-paste" onclick="pasteScore('heardle_00s','heardle')">📋 Paste</button>
          </div>
          <div id="hint-heardle_00s" class="parse-hint hidden"></div>
          <div class="manual-row">
            <label>Manual:</label>
            <select class="score-select" id="sel-heardle_00s" onchange="manualScore('heardle_00s',this.value)">
              <option value="">—</option>
              <option value="1">1</option><option value="2">2</option>
              <option value="3">3</option><option value="4">4</option>
              <option value="5">5</option><option value="6">6</option>
              <option value="10">10 (missed all)</option>
              <option value="0">X (unavailable)</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="submit-section hidden" id="submit-section">
      <div class="score-preview">
        <div class="preview-label">Your score string</div>
        <div class="preview-string" id="preview-string">—</div>
      </div>
      <button class="btn-copy" onclick="copyScores()">📋 Copy to clipboard (for text thread)</button>
      <button class="btn-submit" id="btn-submit" onclick="saveScores()" disabled>Select your player first</button>
      <div id="status-msg" class="status-msg hidden"></div>
    </div>
  </div>

  <!-- TODAY TAB -->
  <div class="section" id="section-today">
    <div class="leaderboard" id="today-leaderboard">
      <div class="no-data">Loading...</div>
    </div>
  </div>

  <!-- STANDINGS TAB -->
  <div class="section" id="section-standings">
    <div id="standings-content">
      <div class="no-data">Loading...</div>
    </div>
  </div>
</div>

<script>

const AUTH_KEY = "dg_auth";
const AUTH_PASS = "boloboyz";

function checkAuth() {
  const val = document.getElementById("auth-input").value.trim().toLowerCase();
  if (val === AUTH_PASS) {
    localStorage.setItem(AUTH_KEY, btoa(AUTH_PASS));
    document.getElementById("auth-gate").style.display = "none";
  } else {
    document.getElementById("auth-error").textContent = "Wrong password. Try again.";
    document.getElementById("auth-input").value = "";
  }
}

// On load — check localStorage
if (localStorage.getItem(AUTH_KEY) === btoa(AUTH_PASS)) {
  document.getElementById("auth-gate").style.display = "none";
}

const SUPABASE_URL = "https://prvrmmwicuionzuzmfnw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBydnJtbXdpY3Vpb256dXptZm53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODkyMDEsImV4cCI6MjA4OTI2NTIwMX0.L2iGKoOOqwDt4158ca4g5pXbcBA_zyxeQRsJy1wQlNQ";

const PLAYERS = [
  { id: "C", emoji: "🤖", label: "C" },
  { id: "E", emoji: "🫅🏽", label: "E" },
  { id: "M", emoji: "🤴🏼", label: "M" },
];

const GAMES = [
  { key: "wordle",      label: "Wordle",      abbr: "W",  color: "#6aaa64" },
  { key: "framed",      label: "Framed",      abbr: "F",  color: "#e9a84c" },
  { key: "heardle_90s", label: "90s Heardle", abbr: "9H", color: "#e96c9a" },
  { key: "heardle_00s", label: "00s Heardle", abbr: "0H", color: "#7b9cff" },
];

let currentPlayer = null;
let scores = { wordle: null, framed: null, heardle_90s: null, heardle_00s: null };
let allScores = [];

// Date header
document.getElementById("today-date").textContent = new Date().toLocaleDateString("en-US", {
  weekday: "short", month: "short", day: "numeric"
});

function showTab(tab) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("section-" + tab).classList.add("active");
  event.target.classList.add("active");
  if (tab === "today" || tab === "standings") fetchLeaderboard();
}

function selectPlayer(id, emoji) {
  currentPlayer = PLAYERS.find(p => p.id === id);
  document.querySelectorAll(".player-btn").forEach(b => b.classList.remove("selected"));
  event.currentTarget.classList.add("selected");
  updateSubmitButton();
}

function manualScore(key, val) {
  scores[key] = val === "" ? null : parseInt(val);
  updateBadge(key);
  updatePreview();
}

function updateBadge(key) {
  const game = GAMES.find(g => g.key === key);
  const badge = document.getElementById("badge-" + key);
  const card = document.getElementById("card-" + key);
  const val = scores[key];
  if (val !== null) {
    badge.textContent = game.abbr + formatScore(val);
    badge.style.color = game.color;
    card.classList.add("done");
  } else {
    badge.textContent = game.abbr;
    badge.style.color = "#2a2f40";
    card.classList.remove("done");
  }
}

function updatePreview() {
  const parts = GAMES.map(g => {
    const v = scores[g.key];
    if (v === null) return null;
    return g.abbr + formatScore(v);
  }).filter(Boolean);
  const str = parts.join(" ");
  document.getElementById("preview-string").textContent = str || "—";
  const hasAny = Object.values(scores).some(v => v !== null);
  document.getElementById("submit-section").classList.toggle("hidden", !hasAny);
  updateSubmitButton();
}

function updateSubmitButton() {
  const btn = document.getElementById("btn-submit");
  if (currentPlayer) {
    btn.disabled = false;
    btn.textContent = "Save scores as " + currentPlayer.emoji + " " + currentPlayer.label;
  } else {
    btn.disabled = true;
    btn.textContent = "Select your player first";
  }
}

async function pasteScore(gameKey, parseType) {
  const hint = document.getElementById("hint-" + gameKey);
  hint.classList.remove("hidden");
  try {
    const text = await navigator.clipboard.readText();
    let val = null;
    if (parseType === "wordle") val = parseWordle(text);
    else if (parseType === "framed") val = parseFramed(text);
    else if (parseType === "heardle") val = parseHeardle(text);

    if (val !== null) {
      scores[gameKey] = val;
      const display = val === 10 ? "10 (missed all)" : val === 0 ? "X (unavailable)" : String(val);
      hint.className = "parse-hint";
      hint.textContent = "✓ Parsed: " + display;
      document.getElementById("sel-" + gameKey).value = String(val);
      updateBadge(gameKey);
      updatePreview();
    } else {
      hint.className = "parse-error";
      hint.textContent = "Couldn't parse — set manually below";
    }
  } catch(e) {
    hint.className = "parse-error";
    hint.textContent = "Clipboard blocked — set manually below";
  }
}

function parseWordle(text) {
  const m = text.match(/Wordle[\s\S]*?(\d+|X)\/6/i);
  if (!m) return null;
  return m[1] === "X" ? 10 : parseInt(m[1]);
}

function parseFramed(text) {
  // Framed uses emoji grid: 🎥 🟥 🟥 🟥 🟥 🟥 🟩
  // Strip the 🎥 camera emoji and spaces, then count reds before green
  if (!text.includes("Framed")) return null;
  const chars = [...text];
  // Filter to only the result squares (ignore 🎥 camera)
  const squares = chars.filter(c => ["🟥","🟩","🟨","⬛"].includes(c));
  if (!squares.length) return null;
  const greenIdx = squares.findIndex(c => c === "🟩");
  if (greenIdx === -1) return 10; // all red = missed
  return greenIdx + 1;
}

function parseHeardle(text) {
  // Strip leading speaker/sound emoji (🔈🔇🔉🔊) then count result squares
  // e.g. 🔈⬛️⬛️⬛️⬛️⬛️🟩 — strip 🔈, count ⬛ before 🟩 = 6
  const chars = [...text];
  // Filter to only result squares, ignoring speaker emojis and variation selectors
  const squares = chars.filter(c => ["🟥","🟩","🟨","⬛️","⬛","❌","✅"].includes(c));
  if (!squares.length) return null;
  const greenIdx = squares.findIndex(c => c === "🟩" || c === "✅");
  if (greenIdx === -1) return 10; // all wrong = missed
  return greenIdx + 1;
}

async function copyScores() {
  const str = document.getElementById("preview-string").textContent;
  try {
    await navigator.clipboard.writeText(str);
    const btn = document.querySelector(".btn-copy");
    btn.textContent = "✓ Copied!";
    setTimeout(() => btn.textContent = "📋 Copy to clipboard (for text thread)", 2000);
  } catch(e) {
    alert("Copy failed — select and copy the score string manually: " + str);
  }
}

async function saveScores() {
  if (!currentPlayer) return;
  const today = getPSTDate();
  const payload = {
    player: currentPlayer.id,
    score_date: today,
    wordle: scores.wordle,
    framed: scores.framed,
    heardle_90s: scores.heardle_90s,
    heardle_00s: scores.heardle_00s,
    updated_at: new Date().toISOString(),
  };
  const statusEl = document.getElementById("status-msg");
  statusEl.classList.remove("hidden");
  statusEl.className = "status-msg";
  statusEl.textContent = "Saving...";
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/scores?on_conflict=player,score_date`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        Prefer: "resolution=merge-duplicates",
      },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(await res.text());
    statusEl.className = "status-msg success";
    const cycleHit = isCycle(payload);
    statusEl.textContent = cycleHit ? "🚲 YOU HIT THE CYCLE! 🎉" : "Scores saved! 🎉";
    if (cycleHit) launchConfetti();
    setTimeout(() => statusEl.classList.add("hidden"), cycleHit ? 5000 : 3000);
  } catch(e) {
    statusEl.className = "status-msg error";
    statusEl.textContent = "Save failed: " + e.message;
  }
}

async function fetchLeaderboard() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/scores?order=score_date.desc&limit=100`, {
      headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY }
    });
    allScores = await res.json();
    renderToday();
    renderStandings();
  } catch(e) {
    document.getElementById("today-leaderboard").innerHTML = '<div class="no-data">Failed to load scores</div>';
  }
}

function rowTotal(row) {
  // 0 = unavailable (excluded from total), 10 = missed all guesses
  return GAMES.reduce((sum, g) => {
    const v = row[g.key];
    if (v === null || v === undefined || v === 0) return sum;
    return sum + v;
  }, 0);
}

function dayResult(rows) {
  // Returns { winners: [row,...], tied: bool }
  // A row counts as complete if all 4 games have a value (including 0=unavailable)
  const complete = rows.filter(r =>
    r.wordle !== null && r.framed !== null &&
    r.heardle_90s !== null && r.heardle_00s !== null
  );
  if (!complete.length) return { winners: [], tied: false };
  const best = Math.min(...complete.map(r => rowTotal(r)));
  const winners = complete.filter(r => rowTotal(r) === best);
  return { winners, tied: winners.length > 1 };
}

function formatScore(val) {
  if (val === null || val === undefined) return "-";
  if (val === 0) return "X";   // Unavailable = X in display
  if (val === 10) return "10"; // Missed all guesses = 10
  return String(val);
}


function isCycle(row) {
  const vals = [row.wordle, row.framed, row.heardle_90s, row.heardle_00s];
  if (vals.some(v => v === null || v === undefined)) return false;
  return [1,2,3,4].every(n => vals.includes(n)) && vals.every(v => [1,2,3,4].includes(v));
}

function launchConfetti() {
  const canvas = document.getElementById("confetti-canvas");
  canvas.style.display = "block";
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = Array.from({ length: 160 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    w: Math.random() * 10 + 6,
    h: Math.random() * 6 + 4,
    color: ["#f7d84b","#39ff85","#e96c9a","#7b9cff","#e9a84c","#fff"][Math.floor(Math.random()*6)],
    rot: Math.random() * 360,
    vx: (Math.random() - 0.5) * 3,
    vy: Math.random() * 4 + 2,
    vr: (Math.random() - 0.5) * 6,
  }));
  let frame = 0;
  const maxFrames = 220;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - frame / maxFrames);
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
    });
    frame++;
    if (frame < maxFrames) requestAnimationFrame(draw);
    else canvas.style.display = "none";
  }
  draw();
}

function getPSTDate() {
  return new Date().toLocaleDateString("en-CA", { timeZone: "America/Los_Angeles" });
}

function renderToday() {
  const today = getPSTDate();
  const todayRows = allScores.filter(r => r.score_date === today);
  const container = document.getElementById("today-leaderboard");

  if (!todayRows.length) {
    container.innerHTML = '<div class="no-data">No scores yet today. Be the first!</div>';
    return;
  }

  const result = dayResult(todayRows);
  const winnerIds = result.winners.map(r => r.player);
  const sorted = [...todayRows].sort((a, b) => rowTotal(a) - rowTotal(b));

  let html = '<div class="lb-day-card"><div class="lb-day-header">';
  html += `<span class="lb-day-date">${new Date(today + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}</span>`;
  if (result.tied && result.winners.length) {
    const tiedEmojis = result.winners.map(r => PLAYERS.find(p => p.id === r.player)?.emoji).join("");
    html += `<span class="lb-winner-badge">👔 ${tiedEmojis} TIE</span>`;
  } else if (result.winners.length === 1) {
    const wp = PLAYERS.find(p => p.id === result.winners[0].player);
    if (wp) html += `<span class="lb-winner-badge">🏆 ${wp.emoji} ${wp.label}</span>`;
  }
  html += '</div>';

  let anyCycleToday = false;
  sorted.forEach(row => {
    const p = PLAYERS.find(x => x.id === row.player);
    if (!p) return;
    const isWinner = winnerIds.includes(row.player);
    const hasCycle = isCycle(row);
    if (hasCycle) anyCycleToday = true;
    html += `<div class="lb-player-row">
      <span class="lb-player-emoji">${p.emoji}</span>
      <div class="lb-scores">`;
    GAMES.forEach(g => {
      html += `<span class="lb-score-chip" style="color:${row[g.key] ? g.color : '#2a2f40'}">${g.abbr}${formatScore(row[g.key])}</span>`;
    });
    html += `</div><span class="lb-total" style="color:${isWinner ? '#39ff85' : '#e8eaf0'}">${rowTotal(row) || "—"}${hasCycle ? '<span class="cycle-badge">🚲 CYCLE</span>' : ''}</span></div>`;
  });

  html += '</div>';
  container.innerHTML = html;
  if (anyCycleToday) launchConfetti();
}

function renderStandings() {
  const winCounts = {};
  PLAYERS.forEach(p => { winCounts[p.id] = { wins: 0, ties: 0, cycles: 0, days: 0, total: 0 }; });

  const byDate = {};
  allScores.forEach(row => {
    if (!byDate[row.score_date]) byDate[row.score_date] = [];
    byDate[row.score_date].push(row);
  });

  Object.values(byDate).forEach(rows => {
    const result = dayResult(rows);
    result.winners.forEach(w => {
      if (!winCounts[w.player]) return;
      if (result.tied) {
        winCounts[w.player].ties++;
      } else {
        winCounts[w.player].wins++;
      }
    });
    rows.forEach(r => {
      if (winCounts[r.player]) {
        winCounts[r.player].days++;
        winCounts[r.player].total += rowTotal(r);
        if (isCycle(r)) winCounts[r.player].cycles++;
      }
    });
  });

  const sorted = [...PLAYERS].sort((a, b) => {
    const aDiff = winCounts[b.id].wins - winCounts[a.id].wins;
    if (aDiff !== 0) return aDiff;
    return winCounts[b.id].ties - winCounts[a.id].ties;
  });

  let html = '<div class="lb-section-title">All-time wins</div><div class="standings-card">';
  sorted.forEach((p, i) => {
    const s = winCounts[p.id];
    const avg = s.days > 0 ? (s.total / s.days).toFixed(1) : "—";
    html += `<div class="standings-row">
      <span class="standings-rank">#${i+1}</span>
      <span class="standings-emoji">${p.emoji}</span>
      <div class="standings-stats">
        <span class="standings-name">${p.label}</span>
        <span class="standings-sub">${s.days} days played · avg ${avg}</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
        <span class="standings-wins">${s.wins}W ${s.ties}T</span>
      </div>
    </div>`;
  });
  html += '</div>';

  html += '<div class="lb-section-title" style="margin-top:20px">Per-game averages</div><div class="standings-card">';
  GAMES.forEach(game => {
    html += `<div style="padding:10px 0;border-bottom:1px solid #1e2130">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:8px;height:8px;border-radius:50%;background:${game.color}"></div>
        <span style="font-weight:700;font-size:0.85rem">${game.label}</span>
      </div>`;
    const gameBest = PLAYERS.map(p => {
      const rows = allScores.filter(r => r.player === p.id && r[game.key]);
      const avg = rows.length ? (rows.reduce((s, r) => s + r[game.key], 0) / rows.length).toFixed(1) : null;
      return { ...p, avg, count: rows.length };
    }).filter(x => x.avg !== null).sort((a, b) => parseFloat(a.avg) - parseFloat(b.avg));

    if (!gameBest.length) {
      html += `<div style="color:#5a5f70;font-size:0.75rem;font-family:'Space Mono',monospace">No data yet</div>`;
    } else {
      gameBest.forEach((p, i) => {
        html += `<div style="display:flex;align-items:center;gap:8px;padding:4px 0">
          <span style="font-family:'Space Mono',monospace;font-size:0.7rem;color:#5a5f70;width:16px">#${i+1}</span>
          <span style="font-size:1rem">${p.emoji}</span>
          <span style="font-family:'Space Mono',monospace;font-size:0.8rem;flex:1">${p.label}</span>
          <span style="font-family:'Space Mono',monospace;font-size:0.8rem;color:${game.color}">${p.avg} avg</span>
        </div>`;
      });
    }
    html += '</div>';
  });
  html += '</div>';

  // Hall of fame — only appears if at least one cycle has been hit
  const allCycles = allScores.filter(r => isCycle(r))
    .sort((a, b) => b.score_date.localeCompare(a.score_date));

  if (allCycles.length > 0) {
    html += '<div class="lb-section-title" style="margin-top:20px">🚲 hall of fame</div><div class="standings-card">';
    allCycles.forEach(r => {
      const p = PLAYERS.find(x => x.id === r.player);
      if (!p) return;
      const dateStr = new Date(r.score_date + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });
      const vals = GAMES.map(g => `${g.abbr}${formatScore(r[g.key])}`).join(" ");
      html += `<div class="standings-row">
        <span class="standings-emoji">${p.emoji}</span>
        <div class="standings-stats">
          <span class="standings-name">${p.label} <span class="cycle-badge">🚲 CYCLE</span></span>
          <span class="standings-sub">${dateStr} · ${vals}</span>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  document.getElementById("standings-content").innerHTML = html;
}
